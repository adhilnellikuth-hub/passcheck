<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a0f;
    --panel: #0b1117;
    --border: #1a2a3a;
    --green: #00ff88;
    --cyan: #00d4ff;
    --yellow: #ffcc00;
    --orange: #ff8800;
    --red: #ff2244;
    --dim: #2a4a5a;
    --text: #c8d8e8;
    --muted: #4a6a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 600px;
    position: relative;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }

  .header-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.7;
  }

  .header h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    line-height: 1;
  }

  .header h1 span {
    color: var(--cyan);
  }

  /* Main panel */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 32px;
    position: relative;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: 0.6;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* Input section */
  .input-section {
    margin-bottom: 28px;
  }

  .input-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .input-wrapper {
    position: relative;
  }

  .password-input {
    width: 100%;
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    padding: 14px 50px 14px 18px;
    outline: none;
    letter-spacing: 2px;
    transition: border-color 0.3s, box-shadow 0.3s;
    caret-color: var(--cyan);
  }

  .password-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 1px rgba(0,212,255,0.15), inset 0 0 20px rgba(0,212,255,0.04);
  }

  .toggle-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    transition: color 0.2s;
    line-height: 1;
  }
  .toggle-btn:hover { color: var(--cyan); }

  /* Strength bar */
  .strength-section {
    margin-bottom: 28px;
  }

  .strength-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .strength-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .strength-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    transition: color 0.4s;
  }

  .strength-bars {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  }

  .bar-segment {
    height: 4px;
    background: var(--border);
    transition: background 0.4s, box-shadow 0.4s;
  }

  .bar-segment.active {
    box-shadow: 0 0 8px currentColor;
  }

  .crack-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .crack-time span {
    color: var(--text);
  }

  /* Criteria grid */
  .criteria-section {
    margin-bottom: 28px;
  }

  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .criteria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .criterion {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    transition: border-color 0.3s, background 0.3s;
  }

  .criterion.met {
    border-color: rgba(0,255,136,0.3);
    background: rgba(0,255,136,0.04);
  }

  .crit-icon {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    width: 18px;
    text-align: center;
    transition: color 0.3s;
    flex-shrink: 0;
  }

  .crit-icon.unmet { color: var(--dim); }
  .crit-icon.met { color: var(--green); }

  .crit-text {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    transition: color 0.3s;
    letter-spacing: 0.5px;
  }

  .criterion.met .crit-text { color: var(--text); }

  /* Entropy */
  .entropy-section {
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .entropy-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .entropy-row:last-child { margin-bottom: 0; }

  .entropy-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .entropy-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--cyan);
    font-weight: 600;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .blink {
    animation: pulse 1.2s infinite;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-label">// Security Tool v1.0</div>
    <h1>Password <span>Analyzer</span></h1>
  </div>

  <div class="panel">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Input -->
    <div class="input-section">
      <label class="input-label" for="pwdInput">// Enter password</label>
      <div class="input-wrapper">
        <input type="password" class="password-input" id="pwdInput" placeholder="type here..." autocomplete="off" spellcheck="false">
        <button class="toggle-btn" id="toggleBtn" title="Toggle visibility">👁</button>
      </div>
    </div>

    <!-- Strength bar -->
    <div class="strength-section">
      <div class="strength-header">
        <span class="strength-label">// Strength</span>
        <span class="strength-score" id="strengthScore">—</span>
      </div>
      <div class="strength-bars" id="strengthBars">
        <div class="bar-segment" id="bar0"></div>
        <div class="bar-segment" id="bar1"></div>
        <div class="bar-segment" id="bar2"></div>
        <div class="bar-segment" id="bar3"></div>
        <div class="bar-segment" id="bar4"></div>
      </div>
      <div class="crack-time">Est. crack time: <span id="crackTime">—</span></div>
    </div>

    <!-- Criteria -->
    <div class="criteria-section">
      <div class="section-title">Criteria Check</div>
      <div class="criteria-grid">
        <div class="criterion" id="c-length">
          <div class="crit-icon unmet" id="i-length">○</div>
          <div class="crit-text">Min. 8 characters</div>
        </div>
        <div class="criterion" id="c-upper">
          <div class="crit-icon unmet" id="i-upper">○</div>
          <div class="crit-text">Uppercase letter</div>
        </div>
        <div class="criterion" id="c-lower">
          <div class="crit-icon unmet" id="i-lower">○</div>
          <div class="crit-text">Lowercase letter</div>
        </div>
        <div class="criterion" id="c-digit">
          <div class="crit-icon unmet" id="i-digit">○</div>
          <div class="crit-text">Number (0–9)</div>
        </div>
        <div class="criterion" id="c-special">
          <div class="crit-icon unmet" id="i-special">○</div>
          <div class="crit-text">Special character</div>
        </div>
        <div class="criterion" id="c-length16">
          <div class="crit-icon unmet" id="i-length16">○</div>
          <div class="crit-text">16+ characters</div>
        </div>
      </div>
    </div>

    <!-- Entropy & Stats -->
    <div class="entropy-section">
      <div class="section-title">Entropy & Stats</div>
      <div class="entropy-row">
        <span class="entropy-key">length</span>
        <span class="entropy-val" id="statLen">0</span>
      </div>
      <div class="entropy-row">
        <span class="entropy-key">charset_size</span>
        <span class="entropy-val" id="statCharset">0</span>
      </div>
      <div class="entropy-row">
        <span class="entropy-key">entropy_bits</span>
        <span class="entropy-val" id="statEntropy">0.00</span>
      </div>
      <div class="entropy-row">
        <span class="entropy-key">unique_chars</span>
        <span class="entropy-val" id="statUnique">0</span>
      </div>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('pwdInput');
  const toggleBtn = document.getElementById('toggleBtn');

  // Toggle visibility
  toggleBtn.addEventListener('click', () => {
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    toggleBtn.textContent = isHidden ? '🙈' : '👁';
  });

  input.addEventListener('input', () => analyze(input.value));

  function analyze(pwd) {
    const checks = {
      length:    pwd.length >= 8,
      upper:     /[A-Z]/.test(pwd),
      lower:     /[a-z]/.test(pwd),
      digit:     /[0-9]/.test(pwd),
      special:   /[^A-Za-z0-9]/.test(pwd),
      length16:  pwd.length >= 16,
    };

    // Update criteria UI
    Object.entries(checks).forEach(([key, met]) => {
      const card = document.getElementById(`c-${key}`);
      const icon = document.getElementById(`i-${key}`);
      if (met) {
        card.classList.add('met');
        icon.classList.remove('unmet');
        icon.classList.add('met');
        icon.textContent = '✓';
      } else {
        card.classList.remove('met');
        icon.classList.add('unmet');
        icon.classList.remove('met');
        icon.textContent = '○';
      }
    });

    // Charset size for entropy
    let charsetSize = 0;
    if (checks.lower)   charsetSize += 26;
    if (checks.upper)   charsetSize += 26;
    if (checks.digit)   charsetSize += 10;
    if (checks.special) charsetSize += 32;
    if (charsetSize === 0 && pwd.length > 0) charsetSize = 26;

    const entropy = pwd.length > 0 ? (pwd.length * Math.log2(charsetSize || 1)) : 0;
    const unique  = new Set(pwd).size;

    // Stats
    document.getElementById('statLen').textContent     = pwd.length;
    document.getElementById('statCharset').textContent = charsetSize;
    document.getElementById('statEntropy').textContent = entropy.toFixed(2) + ' bits';
    document.getElementById('statUnique').textContent  = unique;

    // Score (0–5)
    let score = 0;
    if (pwd.length === 0) { score = 0; }
    else {
      if (checks.length)   score++;
      if (checks.upper)    score++;
      if (checks.lower)    score++;
      if (checks.digit || checks.special) score++;
      if (checks.length16 || (checks.special && pwd.length >= 12)) score++;
    }

    const levels = [
      { label: 'CRITICAL', color: '#ff2244' },
      { label: 'WEAK',     color: '#ff5500' },
      { label: 'FAIR',     color: '#ffcc00' },
      { label: 'GOOD',     color: '#88dd00' },
      { label: 'STRONG',   color: '#00ff88' },
      { label: 'FORTRESS', color: '#00d4ff' },
    ];

    const level = pwd.length === 0 ? null : levels[score];

    // Update bars
    for (let i = 0; i < 5; i++) {
      const bar = document.getElementById(`bar${i}`);
      if (pwd.length === 0) {
        bar.style.background = 'var(--border)';
        bar.style.boxShadow = 'none';
        bar.classList.remove('active');
      } else if (i < score) {
        bar.style.background = level.color;
        bar.style.color = level.color;
        bar.style.boxShadow = `0 0 8px ${level.color}`;
        bar.classList.add('active');
      } else {
        bar.style.background = 'var(--border)';
        bar.style.boxShadow = 'none';
        bar.classList.remove('active');
      }
    }

    // Score label
    const scoreEl = document.getElementById('strengthScore');
    if (!level) {
      scoreEl.textContent = '—';
      scoreEl.style.color = 'var(--muted)';
    } else {
      scoreEl.textContent = level.label;
      scoreEl.style.color = level.color;
    }

    // Crack time estimate
    const crackEl = document.getElementById('crackTime');
    if (pwd.length === 0) {
      crackEl.textContent = '—';
    } else {
      const combinations = Math.pow(charsetSize || 1, pwd.length);
      const guessesPerSec = 1e10; // 10 billion/sec (GPU brute force)
      const seconds = combinations / guessesPerSec / 2; // avg half keyspace
      crackEl.textContent = formatTime(seconds);
    }
  }

  function formatTime(seconds) {
    if (seconds < 1)          return '< 1 second';
    if (seconds < 60)         return `~${Math.round(seconds)} seconds`;
    if (seconds < 3600)       return `~${Math.round(seconds/60)} minutes`;
    if (seconds < 86400)      return `~${Math.round(seconds/3600)} hours`;
    if (seconds < 2592000)    return `~${Math.round(seconds/86400)} days`;
    if (seconds < 31536000)   return `~${Math.round(seconds/2592000)} months`;
    if (seconds < 3.15e9)     return `~${Math.round(seconds/31536000)} years`;
    if (seconds < 3.15e12)    return `~${(seconds/3.15e9).toFixed(1)}K years`;
    if (seconds < 3.15e15)    return `~${(seconds/3.15e12).toFixed(1)}M years`;
    return '∞ (heat death of universe)';
  }
</script>
</body>
</html>
